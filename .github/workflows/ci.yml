name: CI

on:
  pull_request:
  push:
    branches:
      - main
      - master
      - "milestone-*"

jobs:
  check:
    name: Typecheck, lint, test, build
    runs-on: ubuntu-latest

    env:
      DATABASE_URL: "file:./ci.db"
      NEXT_PUBLIC_BASE_URL: "http://localhost:3000"

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install
        run: npm ci

      - name: Generate Prisma Client
        run: npx prisma generate

      - name: Typecheck
        run: npm run typecheck

      - name: Lint
        run: npm run lint

      - name: Test
        run: npm run test

      - name: Build
        run: npm run build
